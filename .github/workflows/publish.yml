name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      tag:
        description: "npm dist-tag (default: latest)"
        required: false
        default: "latest"
        type: string

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Bump versions
        run: |
          BUMP="${{ inputs.bump }}"
          for pkg in packages/fullstack packages/react-render-null packages/wmux plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            cd "$pkg"
            CURRENT=$(node -p "require('./package.json').version")
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const [major, minor, patch] = pkg.version.split('.').map(Number);
              const bump = '$BUMP';
              if (bump === 'major') pkg.version = (major+1)+'.0.0';
              else if (bump === 'minor') pkg.version = major+'.'+(minor+1)+'.0';
              else pkg.version = major+'.'+minor+'.'+(patch+1);
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            NEW=$(node -p "require('./package.json').version")
            echo "  $pkg: $CURRENT → $NEW"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Set wmux client URL
        run: |
          WMUX_CLIENT_URL="${{ vars.WMUX_CLIENT_URL || 'https://wmux.playfast.dev' }}"
          sed -i "s|__WMUX_CLIENT_URL__|$WMUX_CLIENT_URL|g" packages/wmux/src/wmux.tsx

      - name: Replace workspace protocol with real versions
        run: |
          ECHOFORM_VERSION=$(node -p "require('./packages/fullstack/package.json').version")
          RENDER_VERSION=$(node -p "require('./packages/react-render-null/package.json').version")
          for pkg in packages/fullstack packages/react-render-null packages/wmux plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg/package.json', 'utf8'));
              const replace = (deps) => {
                if (!deps) return;
                for (const [k, v] of Object.entries(deps)) {
                  if (v === 'workspace:*') {
                    if (k === '@playfast/echoform') deps[k] = '^$ECHOFORM_VERSION';
                    else if (k === '@playfast/echoform-render') deps[k] = '^$RENDER_VERSION';
                    else {
                      const depPkg = ['packages/fullstack','packages/react-render-null','packages/wmux',
                        'plugins/fullstack/bun-ws-client','plugins/fullstack/bun-ws-server',
                        'plugins/fullstack/socket-client','plugins/fullstack/socket-server']
                        .find(p => JSON.parse(fs.readFileSync(p+'/package.json','utf8')).name === k);
                      if (depPkg) deps[k] = '^' + JSON.parse(fs.readFileSync(depPkg+'/package.json','utf8')).version;
                    }
                  }
                }
              };
              replace(pkg.dependencies);
              replace(pkg.devDependencies);
              replace(pkg.peerDependencies);
              fs.writeFileSync('$pkg/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Publish with provenance
        run: |
          TAG="${{ inputs.tag }}"
          for pkg in packages/fullstack packages/react-render-null packages/wmux plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            cd "$pkg"
            NAME=$(node -p "require('./package.json').name")
            VERSION=$(node -p "require('./package.json').version")
            echo "Publishing $NAME@$VERSION"
            npm publish --access public --tag "$TAG" --provenance || echo "  ⚠ $NAME publish failed"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Commit version bump
        run: |
          VERSION=$(node -p "require('./packages/fullstack/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v$VERSION"
          git tag "v$VERSION"
          git push --follow-tags
