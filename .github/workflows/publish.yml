name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      tag:
        description: "npm dist-tag (default: latest)"
        required: false
        default: "latest"
        type: string

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Bump versions
        run: |
          BUMP="${{ inputs.bump }}"
          for pkg in packages/fullstack packages/react-render-null plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            cd "$pkg"
            CURRENT=$(node -p "require('./package.json').version")
            npm version "$BUMP" --no-git-tag-version
            NEW=$(node -p "require('./package.json').version")
            echo "  $pkg: $CURRENT → $NEW"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish with provenance
        run: |
          TAG="${{ inputs.tag }}"
          for pkg in packages/fullstack packages/react-render-null plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            cd "$pkg"
            NAME=$(node -p "require('./package.json').name")
            VERSION=$(node -p "require('./package.json').version")
            echo "Publishing $NAME@$VERSION"
            npm publish --access public --tag "$TAG" --provenance || echo "  ⚠ $NAME publish failed"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Commit version bump
        run: |
          VERSION=$(node -p "require('./packages/fullstack/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v$VERSION"
          git tag "v$VERSION"
          git push --follow-tags
