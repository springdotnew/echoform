name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests (todo-app)
        working-directory: demo/todo-app
        run: bun run test

      - name: Run Playwright tests (file-editor)
        working-directory: demo/file-editor
        run: bun run test

      - name: Run Playwright tests (dev-server)
        working-directory: demo/dev-server
        run: bun run test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            demo/*/test-results/
            demo/*/playwright-report/
          retention-days: 7

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish (main → patch release)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          # Bump all packages as a patch
          for pkg in packages/fullstack packages/react-render-null plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            cd "$pkg"
            CURRENT=$(node -p "require('./package.json').version")
            # Use npm version to bump patch
            npm version patch --no-git-tag-version
            NEW=$(node -p "require('./package.json').version")
            echo "  $pkg: $CURRENT → $NEW"
            cd "$GITHUB_WORKSPACE"
          done

          # Publish each package
          for pkg in packages/fullstack packages/react-render-null plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            cd "$pkg"
            npm publish --access public || echo "  ⚠ $pkg publish skipped (already exists?)"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish (branch → prerelease)
        if: github.ref != 'refs/heads/master' && github.event_name == 'push'
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # Sanitize branch name for npm tag (replace / and special chars)
          TAG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9.-]/-/g')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)

          for pkg in packages/fullstack packages/react-render-null plugins/fullstack/bun-ws-client plugins/fullstack/bun-ws-server plugins/fullstack/socket-client plugins/fullstack/socket-server; do
            cd "$pkg"
            CURRENT=$(node -p "require('./package.json').version")
            # Strip any existing prerelease suffix, then append branch tag
            BASE=$(echo "$CURRENT" | sed 's/-.*//')
            PRERELEASE="${BASE}-${TAG}.${SHORT_SHA}"
            npm version "$PRERELEASE" --no-git-tag-version
            echo "  $pkg: $CURRENT → $PRERELEASE"
            npm publish --access public --tag "$TAG" || echo "  ⚠ $pkg publish skipped"
            cd "$GITHUB_WORKSPACE"
          done
