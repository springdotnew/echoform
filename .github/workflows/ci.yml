name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Build wmux-client
        working-directory: packages/wmux-client
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests (todo-app)
        working-directory: demo/todo-app
        run: bun run test

      - name: Run Playwright tests (file-editor)
        working-directory: demo/file-editor
        run: bun run test

      - name: Run Playwright tests (dev-server)
        working-directory: demo/dev-server
        run: bun run test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            demo/*/test-results/
            demo/*/playwright-report/
          retention-days: 7
